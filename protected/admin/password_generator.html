<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10‑char password generator · clean</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f1f5f9;
            font-family: system-ui, -apple-system, 'Segoe UI', 'Roboto', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .card {
            background: #ffffff;
            max-width: 500px;
            width: 100%;
            border-radius: 28px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 2px 4px rgba(0, 0, 0, 0.02);
            padding: 1.75rem;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 1.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #e9edf2;
        }

        .header-icon {
            font-size: 1.6rem;
        }

        .header-text h1 {
            font-size: 1.25rem;
            font-weight: 600;
            color: #0a0c10;
            letter-spacing: -0.2px;
        }

        .output-box {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            padding: 1rem 1.2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 1.2rem;
        }

        #pw-display {
            font-family: 'SF Mono', 'Menlo', 'Cascadia Code', monospace;
            font-size: 1.2rem;
            font-weight: 600;
            color: #0f172a;
            letter-spacing: 0.3px;
            word-break: break-all;
        }

        .output-actions {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }

        .icon-btn {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 32px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.3rem;
            transition: all 0.1s;
        }

        .icon-btn:hover {
            background: #f1f5f9;
            border-color: #cbd5e1;
        }

        .icon-btn.success {
            color: #0f7b3a;
            border-color: #bbf7d0;
            background: #ecfdf5;
        }

        .strength-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 1.25rem;
        }

        .bars {
            display: flex;
            gap: 5px;
            flex: 1;
        }

        .bar {
            height: 4px;
            flex: 1;
            background: #e2e8f0;
            border-radius: 4px;
        }

        .bar.weak { background: #e54c4c; }
        .bar.fair { background: #e9a23b; }
        .bar.good { background: #2e9b6b; }

        .strength-label {
            font-size: 0.7rem;
            font-weight: 500;
            font-family: monospace;
            min-width: 58px;
            text-align: right;
            color: #5b6e8c;
        }

        .meta-grid {
            display: flex;
            gap: 1rem;
            background: #fefefe;
            border: 1px solid #ecf1f6;
            border-radius: 20px;
            padding: 0.8rem 1.2rem;
            margin-bottom: 1.5rem;
            justify-content: flex-start;
        }

        .meta-card {
            flex: 0 0 auto;
        }

        .meta-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 500;
            color: #7c8aa5;
            margin-bottom: 4px;
        }

        .meta-val {
            font-family: monospace;
            font-size: 0.9rem;
            font-weight: 600;
            color: #1e293b;
        }

        .gen-btn {
            width: 100%;
            background: #ffffff;
            border: 1px solid #cbdde9;
            border-radius: 48px;
            padding: 10px 0;
            font-size: 0.85rem;
            font-weight: 500;
            color: #1e3a8a;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.15s;
        }

        .gen-btn:hover {
            background: #f8fcff;
            border-color: #a0c0e0;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="card-header">
        <div class="header-icon">🔐</div>
        <div class="header-text">
            <h1>password generator</h1>
        </div>
    </div>

    <div class="output-box">
        <span id="pw-display">——————</span>
        <div class="output-actions">
            <button class="icon-btn" id="copy-btn" title="Copy password">📎</button>
            <button class="icon-btn" id="regenerate-btn" title="Regenerate">🔄</button>
        </div>
    </div>

    <div class="strength-row">
        <div class="bars">
            <div class="bar" id="b1"></div>
            <div class="bar" id="b2"></div>
            <div class="bar" id="b3"></div>
            <div class="bar" id="b4"></div>
        </div>
        <span class="strength-label" id="strength-label">—</span>
    </div>

    <div class="meta-grid">
        <div class="meta-card">
            <div class="meta-label">Length</div>
            <div class="meta-val" id="m-len">—</div>
        </div>
    </div>

    <button class="gen-btn" id="generate-btn">
        🔄 Generate new 10‑char password
    </button>
</div>

<script>
    const PASSWORD_LEN = 10;

    const upperCase = 'ABCDEFGHJKLMNPQRSTUVWXYZ';
    const lowerCase = 'abcdefghjkmnpqrstuvwxyz';
    const digits    = '23456789';
    const symbols   = '!@#$%&*';
    const allChars = upperCase + lowerCase + digits + symbols;

    function rand(max) {
        return Math.floor(Math.random() * max);
    }

    function generateStrongPassword() {
        let pw = '';
        pw += upperCase[rand(upperCase.length)];
        pw += lowerCase[rand(lowerCase.length)];
        pw += digits[rand(digits.length)];
        pw += symbols[rand(symbols.length)];
        for (let i = pw.length; i < PASSWORD_LEN; i++) {
            pw += allChars[rand(allChars.length)];
        }
        return shuffle(pw);
    }

    function shuffle(str) {
        const arr = str.split('');
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr.join('');
    }

    function computeEntropy(pw) {
        let pool = 0;
        if (/[a-z]/.test(pw)) pool += 26;
        if (/[A-Z]/.test(pw)) pool += 26;
        if (/\d/.test(pw))    pool += 10;
        if (/[^a-zA-Z0-9]/.test(pw)) pool += symbols.length;
        if (pool === 0) pool = 1;
        return Math.round(pw.length * Math.log2(pool));
    }

    function getStrength(entropy) {
        if (entropy < 40) return { label: 'Weak', bars: 1, cls: 'weak' };
        if (entropy < 55) return { label: 'Fair', bars: 2, cls: 'fair' };
        if (entropy < 70) return { label: 'Good', bars: 3, cls: 'good' };
        return { label: 'Strong', bars: 4, cls: 'good' };
    }

    let currentPassword = '';

    function updateDisplay() {
        document.getElementById('pw-display').textContent = currentPassword;
        const entropy = computeEntropy(currentPassword);
        const strength = getStrength(entropy);
        document.getElementById('m-len').textContent = currentPassword.length;
        const labelEl = document.getElementById('strength-label');
        labelEl.textContent = strength.label;
        labelEl.className = `strength-label ${strength.cls}`;
        for (let i = 1; i <= 4; i++) {
            const bar = document.getElementById('b' + i);
            if (i <= strength.bars) {
                bar.className = `bar ${strength.cls}`;
            } else {
                bar.className = 'bar';
            }
        }
        const copyBtn = document.getElementById('copy-btn');
        copyBtn.classList.remove('success');
        copyBtn.textContent = '📎';
    }

    function generate() {
        currentPassword = generateStrongPassword();
        updateDisplay();
    }

    function copyCurrent() {
        if (!currentPassword) return;
        navigator.clipboard.writeText(currentPassword).catch(() => {});
        const btn = document.getElementById('copy-btn');
        btn.classList.add('success');
        btn.textContent = '✓';
        setTimeout(() => {
            btn.classList.remove('success');
            btn.textContent = '📎';
        }, 1500);
    }

    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('generate-btn').addEventListener('click', generate);
        document.getElementById('regenerate-btn').addEventListener('click', generate);
        document.getElementById('copy-btn').addEventListener('click', copyCurrent);
        generate();
    });

    window.generate = generate;
    window.copyPw = copyCurrent;
</script>
</body>
</html>
